name: Production Android Build Pipeline

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Select Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  configure-and-compile:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ANDROID_ARCHS: 'armeabi-v7a, arm64-v8a, x86, x86_64'
      CMAKE_VERSION: '3.22.1'
      NDK_VERSION: '25.2.9519653'

    steps:
      - name: 1. Initialization - Checkout Source Repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: 2. Runtime Environment - Configure OpenJDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: 3. Optimization - Initialize Global Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 4. Toolchain Setup - Validate System Android Paths
        run: |
          echo "Checking system Android SDK installation path..."
          if [ -z "$ANDROID_HOME" ]; then
            echo "ANDROID_HOME is not set globally. Exporting manually..."
            echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          else
            echo "Android SDK found at: $ANDROID_HOME"
          fi

      - name: 5. Compliance - Pre-Accept Android SDK Licenses
        run: |
          mkdir -p "$ANDROID_HOME/licenses"
          echo -e "\n8933bad161ad4178b1185d1a37fdd41ea392d5d5\n40ac565f7577408d513ff54e5cd2eaf5dba15518\xd56f5187479451eabf01fb74a50224d131bc41f2" > "$ANDROID_HOME/licenses/android-sdk-license"
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > "$ANDROID_HOME/licenses/android-sdk-preview-license"
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: 6. Infrastructure - Install Android NDK and CMake Components
        run: |
          echo "Upgrading toolchain components: CMake ${{ env.CMAKE_VERSION }} & NDK ${{ env.NDK_VERSION }}"
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "cmake;${{ env.CMAKE_VERSION }}" "ndk;${{ env.NDK_VERSION }}"
          echo "Updating global path mappings..."
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: 7. Permissions - Apply Executable Flags to Build Wrappers
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            echo "Execution permissions successfully bound to gradlew."
          else
            echo "ERROR: Gradle wrapper target not found in root directory!"
            exit 1
          fi

      - name: 8. Sanitization - Execute Gradle Environment Clean Task
        run: ./gradlew clean

      - name: 9. Compilation Phase A - Build Target Debug Distribution
        if: ${{ github.event.inputs.build_type == 'debug' }}
        run: ./gradlew assembleDebug --stacktrace --parallel --max-workers=4

      - name: 10. Compilation Phase B - Build Target Release Distribution
        if: ${{ github.event.inputs.build_type == 'release' }}
        run: ./gradlew assembleRelease --stacktrace --parallel --max-workers=4

      - name: 11. Artifact Processing - Locate and Aggregate Packages
        id: locate_artifacts
        run: |
          echo "Scanning output directory tree for compiled binary packages..."
          mkdir -p output_artifacts
          find . -regex '.*\(debug\|release\).*\.apk' -exec cp {} ./output_artifacts/ \;
          echo "Total packages prepared for export:"
          ls -la ./output_artifacts/

      - name: 12. Deployment - Upload Generated Binaries to Workspace
        uses: actions/upload-artifact@v4
        with:
          name: winlator-production-${{ github.event.inputs.build_type }}-apk
          path: ./output_artifacts/*.apk
          if-no-files-found: error
          retention-days: 7
