name: Nightly build

on:
  workflow_dispatch:
    inputs:
      build_profile:
        description: 'Target Compilation Profile Variant'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      compiler_optimization:
        description: 'Enable Aggressive Dalvik Executable Allocation Transforms'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      daemon_pruning:
        description: 'Enforce Background Worker Process Teardown Post Build'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  JDK_VERSION: '17'
  NDK_VERSION: '25.2.9519653'
  CMAKE_VERSION: '3.22.1'
  ANDROID_SDK_ROOT: '/usr/local/lib/android/sdk'
  SDK_MANAGER_PATH: '/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager'
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle_home

jobs:
  compile-native-application:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Repository Source Code Base
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: System Diagnostics - Hardware Profile Pass
        run: |
          uname -a
          lscpu
          free -h

      - name: System Diagnostics - Storage Allocation Status
        run: |
          df -h
          ls -la /usr/local/lib/android/sdk

      - name: Repository Diagnostics - Inspect Active Git Submodules
        run: |
          git submodule status
          git status --short

      - name: Provision OpenJDK Environment Engine
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JDK_VERSION }}

      - name: Mount Core Gradle Global Dependency Cache Layers
        uses: actions/cache@v4
        with:
          path: ${{ env.GRADLE_USER_HOME }}/caches
          key: ${{ runner.os }}-gradle-core-cache-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-core-cache-

      - name: Mount Local Gradle Metadata Wrapper Cache Layers
        uses: actions/cache@v4
        with:
          path: ${{ env.GRADLE_USER_HOME }}/wrapper
          key: ${{ runner.os }}-gradle-wrapper-cache-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-wrapper-cache-

      - name: Mount Native NDK CXX Compilation Object Cache Storage
        uses: actions/cache@v4
        with:
          path: |
            app/.cxx
            app/build/intermediates/cmake
            app/build/intermediates/cxx
          key: ${{ runner.os }}-ndk-native-cxx-cache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ndk-native-cxx-cache-

      - name: Generate Cryptographic SDK Licensing Assertions
        run: |
          mkdir -p "${{ env.ANDROID_SDK_ROOT }}/licenses"
          printf "8933bad161ad4178b1185d1a37fdd41ea392d5d5\n" > "${{ env.ANDROID_SDK_ROOT }}/licenses/android-sdk-license"
          printf "40ac565f7577408d513ff54e5cd2eaf5dba15518\n" >> "${{ env.ANDROID_SDK_ROOT }}/licenses/android-sdk-license"
          printf "d56f5187479451eabf01fb74a50224d131bc41f2\n" >> "${{ env.ANDROID_SDK_ROOT }}/licenses/android-sdk-license"
          printf "84831b9409646a918e30573bab4c9c91346d8abd\n" > "${{ env.ANDROID_SDK_ROOT }}/licenses/android-sdk-preview-license"

      - name: Execute Strict Global License Acceptance Pass
        run: yes | ${{ env.SDK_MANAGER_PATH }} --licenses > /dev/null 2>&1

      - name: Deploy Explicit Host Architecture Compiler (CMake)
        run: yes | ${{ env.SDK_MANAGER_PATH }} --install "cmake;${{ env.CMAKE_VERSION }}"

      - name: Deploy Explicit Native Code Development Kit (NDK)
        run: yes | ${{ env.SDK_MANAGER_PATH }} --install "ndk;${{ env.NDK_VERSION }}"

      - name: Bind Local Environment NDK Compilation Pointers
        run: |
          LOCAL_NDK_BOUND_PATH="${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}"
          printf "ANDROID_NDK_HOME=%s\n" "$LOCAL_NDK_BOUND_PATH" >> $GITHUB_ENV
          printf "NDK_ROOT=%s\n" "$LOCAL_NDK_BOUND_PATH" >> $GITHUB_ENV

      - name: Verify Toolchain Installation Structural Integrity
        run: |
          ls -lah ${{ env.ANDROID_SDK_ROOT }}/cmake/${{ env.CMAKE_VERSION }}
          ls -lah ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}

      - name: Inject Custom Engine JVM Heap Allocation Configurations
        run: |
          mkdir -p ~/.gradle
          printf "org.gradle.jvmargs=-Xmx6144m -XX:MaxMetaspaceSize=2048m -XX:+UseParallelGC -Dfile.encoding=UTF-8\n" > ~/.gradle/gradle.properties
          printf "org.gradle.parallel=true\n" >> ~/.gradle/gradle.properties
          printf "org.gradle.configureondemand=true\n" >> ~/.gradle/gradle.properties
          printf "android.builder.sdkDownload=false\n" >> ~/.gradle/gradle.properties
          if [ "${{ github.event.inputs.compiler_optimization }}" == "true" ]; then
            printf "android.enableDexingArtifactTransform=true\n" >> ~/.gradle/gradle.properties
          fi

      - name: Verify Local Workspace Layout and Architecture Identity
        run: |
          test -f "./gradlew"
          test -f "build.gradle" || test -f "build.gradle.kts"
          test -d "app/src/main"

      - name: Enforce Gradlew System Execution Permissions
        run: chmod +x ./gradlew

      - name: Pre-Fetch Remote Library Dependency Architecture Matrices
        run: ./gradlew dependencies --no-daemon --stacktrace || true

      - name: Execute Core Project Workspace Pruning Task
        run: ./gradlew clean --no-daemon --stacktrace

      - name: Run Build Diagnostics Verification Engine Pass
        run: ./gradlew tasks --no-daemon || true

      - name: Compile Application Target Variant (Debug Pass)
        if: ${{ github.event.inputs.build_profile == 'debug' }}
        run: ./gradlew assembleDebug --stacktrace --info --parallel --max-workers=4

      - name: Compile Application Target Variant (Release Pass)
        if: ${{ github.event.inputs.build_profile == 'release' }}
        run: ./gradlew assembleRelease --stacktrace --info --parallel --max-workers=4

      - name: Initialize Artifact Aggregation and Workspace Assembly
        run: |
          mkdir -p ./compiled_output_binaries
          find . -type f -name "*.apk" -not -path "*/intermediates/*" -exec cp {} ./compiled_output_binaries/ \;

      - name: Evaluate Output Directory Structural Integrity Status
        run: |
          ls -lah ./compiled_output_binaries/
          TOTAL_APKS=$(ls ./compiled_output_binaries/ | wc -l)
          if [ "$TOTAL_APKS" -eq 0 ]; then
            exit 1
          fi

      - name: Analyze Finished Binary File Footprint Metrics
        run: |
          find ./compiled_output_binaries/ -name "*.apk" -exec du -sh {} \;
          find ./compiled_output_binaries/ -name "*.apk" -exec file {} \;

      - name: Ship Compiled Debug Binary to Workspace Dashboard
        if: ${{ github.event.inputs.build_profile == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: Nightly-Debug-Build-${{ github.run_number }}
          path: ./compiled_output_binaries/*.apk
          retention-days: 7
          if-no-files-found: error

      - name: Ship Compiled Release Binary to Workspace Dashboard
        if: ${{ github.event.inputs.build_profile == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: Nightly-Release-Build-${{ github.run_number }}
          path: ./compiled_output_binaries/*.apk
          retention-days: 7
          if-no-files-found: error

      - name: Active Process Monitoring and Thread Inspection Diagnostics
        run: ps aux || true

      - name: Post-Build Workspace Toolchain Environment Teardown
        if: ${{ github.event.inputs.daemon_pruning == 'true' }}
        run: |
          ./gradlew --stop || true
          pkill -f java || true

      - name: System Diagnostics - Storage Cleanliness Analysis
        run: df -h
 
