name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Display disk space before build
        run: df -h

      - name: Show current working directory and list root
        run: |
          pwd
          ls -lh /

      - name: Show OS version and environment summary # new
        run: |
          cat /etc/os-release
          env | sort

      - name: Show free memory # new
        run: free -h

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Licenses
        run: yes | sdkmanager --licenses

      - name: Install Specific CMake Version
        run: sdkmanager --install "cmake;3.22.1"

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Show Gradle version # new
        run: ./gradlew --version

      - name: Make Gradle Executable
        run: chmod +x ./gradlew

      - name: Export JAVA_HOME
        run: echo "JAVA_HOME=${JAVA_HOME}" >> $GITHUB_ENV

      - name: Show Java version # new
        run: java -version

      - name: Export Build Time Information # new
        run: echo "BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_ENV

      - name: Stamping version into APK assets (if applicable) # new
        run: |
          mkdir -p app/src/main/assets
          echo "Build Time: $BUILD_TIME" > app/src/main/assets/build-info.txt

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: List APK outputs
        run: ls -lh app/build/outputs/apk/debug/ || true

      - name: List APK outputs (release) # new
        run: ls -lh app/build/outputs/apk/release/ || true

      - name: Show disk space after build # new
        run: df -h

      - name: Show contents of build-info.txt # new
        run: cat app/src/main/assets/build-info.txt || echo "No build-info.txt"

      - name: Upload Finished Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: winlator-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload Finished Release APK
        uses: actions/upload-artifact@v4
        with:
          name: winlator-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: Upload ProGuard Mapping File (Release) # new
        uses: actions/upload-artifact@v4
        with:
          name: proguard-mapping-release
          path: app/build/outputs/mapping/release/mapping.txt
          retention-days: 7

      - name: Upload Build Info # new
        uses: actions/upload-artifact@v4
        with:
          name: build-information
          path: app/src/main/assets/build-info.txt
          retention-days: 7

      - name: Display workflow run number
        run: echo "This build was run as GitHub Actions workflow ID: ${{ github.run_id }}"

      - name: Show recent files and disk usage # new
        run: |
          find . -type f -printf "%TY-%Tm-%Td %TT %p\n" | sort -r | head -20
          du -h --max-depth=2 | sort -h | tail -20

      - name: Clean up build outputs (optional) # new
        run: |
          rm -rf app/build/outputs/apk/debug/
          rm -rf app/build/outputs/apk/release/
        continue-on-error: true

      - name: Show workflow complete time # new
        run: echo "Workflow completed at $(date -u +"%Y-%m-%dT%H:%M:%SZ")" 
