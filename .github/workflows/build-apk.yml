name: Build Android APK

on:
  workflow_dispatch: # Manual "Run" button in the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Display disk space before build
        run: df -h
        # Diagnostic step to check available disk space

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        # Ensures sdkmanager command is available

      - name: Accept Licenses
        run: yes | sdkmanager --licenses

      - name: Install Specific CMake Version
        run: sdkmanager --install "cmake;3.22.1"

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make Gradle Executable
        run: chmod +x ./gradlew

      - name: Export JAVA_HOME
        run: echo "JAVA_HOME=${JAVA_HOME}" >> $GITHUB_ENV
        # Makes JAVA_HOME available to subsequent steps

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        
      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: List APK outputs
        run: ls -lh app/build/outputs/apk/debug/ || true
        # Shows output files for debugging

      - name: Upload Finished Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: winlator-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload Finished Release APK
        uses: actions/upload-artifact@v4
        with:
          name: winlator-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: Display workflow run number
        run: echo "This build was run as GitHub Actions workflow ID: ${{ github.run_id }}" 
