name: Nightly Build (Temurin Method)

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK & Install CMake
        uses: android-actions/setup-android@v3
        with:
          packages: 'cmake;3.22.1'

      - name: Make Gradle Executable
        run: chmod +x ./gradlew

      - name: Compile and Purge Duplicates
        run: |
          ./gradlew compileDebugSources || true
          find app/build/intermediates/ -name "libFLAC.so" -exec rm -f {} \;
          find app/build/intermediates/ -name "libVulkan.so" -exec rm -f {} \;
          ./gradlew assembleDebug
 
